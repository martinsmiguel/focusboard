<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF9C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D484;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#grad1)"/>
  
  <!-- Chef Hat -->
  <g transform="translate(512, 420) scale(1.2)">
    <!-- Hat base -->
    <ellipse cx="0" cy="80" rx="120" ry="30" fill="#333"/>
    <ellipse cx="0" cy="75" rx="115" ry="25" fill="#00FF9C"/>
    
    <!-- Hat top -->
    <path d="M-100,75 C-100,-60 -60,-120 0,-120 C60,-120 100,-60 100,75" 
          fill="none" 
          stroke="url(#grad2)" 
          stroke-width="12"
          stroke-linecap="round"/>
    
    <!-- Hat folds -->
    <path d="M-30,-120 Q-45,0 -30,75" 
          fill="none" 
          stroke="url(#grad2)" 
          stroke-width="6"
          stroke-linecap="round"/>
    <path d="M30,-120 Q45,0 30,75" 
          fill="none" 
          stroke="url(#grad2)" 
          stroke-width="6"
          stroke-linecap="round"/>
    <path d="M0,-120 Q-10,0 0,75" 
          fill="none" 
          stroke="url(#grad2)" 
          stroke-width="4"
          stroke-linecap="round"/>
  </g>
  
  <!-- Timer/Clock -->
  <g transform="translate(512, 720) scale(0.8)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00FF9C" stroke-width="8"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#00FF9C" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="35" stroke="#00FF9C" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#00FF9C"/>
  </g>
</svg>